<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 건강 상태 문진 (초등) - Supabase 연동</title>
    <!-- 학교 망에서 아래 스크립트가 차단되더라도 화면은 정상 동작하도록 코드를 수정했습니다. -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 520px; }
        h2 { color: white; text-align: center; background-color: #25a55b; padding: 18px 30px; margin: -30px -30px 25px -30px; border-radius: 12px 12px 0 0; font-size: 20px; }
        .form-group { margin-bottom: 18px; }
        .row-group { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 10px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #34495e; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        .part-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .part-label { cursor: pointer; }
        .part-box { border: 2px solid #e0e0e0; border-radius: 8px; padding: 12px 5px; text-align: center; background-color: #fafafa; font-weight: bold; font-size: 15px; transition: all 0.2s; user-select: none; }
        .part-label:hover .part-box { background-color: #f0f0f0; }
        .part-container input[type="radio"] { display: none; }
        .part-container input[type="radio"]:checked + .part-box { border-color: #e74c3c; background-color: #fdedec; color: #e74c3c; }
        .detail-box { background-color: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 18px; display: none; margin-top: 15px; }
        .sub-q { margin-bottom: 15px; }
        .sub-q label { font-weight: 600; color: #2c3e50; margin-bottom: 4px; }
        .radio-inline { display: flex; gap: 15px; margin-top: 4px; flex-wrap: wrap; }
        .radio-inline label { font-weight: normal; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .radio-inline input[type="radio"] { width: auto; }
        button { width: 100%; padding: 14px; background-color: #27be66; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:hover { background-color: #27ae60; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🏥 학생 건강상태 문진 (초등) </h2>
            
        <form id="healthForm">
            <!-- 에러 방지용 hidden input -->
            <input type="hidden" id="school_name" value="">

            <div class="row-group">
                <div class="form-group">
                    <label for="grade">학년</label>
                    <select id="grade" required>
                        <option value="">선택</option>
                        <option value="1학년">1학년</option><option value="2학년">2학년</option><option value="3학년">3학년</option>
                        <option value="4학년">4학년</option><option value="5학년">5학년</option><option value="6학년">6학년</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="class_name">반</label>
                    <select id="class_name" required>
                        <option value="">선택</option>
                        <option value="1반">1반</option><option value="2반">2반</option><option value="3반">3반</option>
                        <option value="4반">4반</option><option value="5반">5반</option><option value="6반">6반</option>
                        <option value="7반">7반</option><option value="8반">8반</option><option value="9반">9반</option><option value="10반">10반</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="student_name">이름</label>
                    <input type="text" id="student_name" placeholder="이름" required>
                </div>
            </div>

            <div class="form-group">
                <label>약, 음식 알러지가 있다면 적어주세요.</label>
                <div style="display:flex; gap:10px; margin-bottom:5px;">
                    <label style="font-weight:normal;"><input type="radio" name="allergy_type" value="없음" checked style="width:auto;"> 없음</label>
                    <label style="font-weight:normal;"><input type="radio" name="allergy_type" value="있음" style="width:auto;"> 있음</label>
                </div>
                <input type="text" id="allergy_detail" placeholder="약, 음식명 (있을 경우 작성)">
            </div>

            <div class="form-group">
                <label>어디가 아픈가요?</label>
                <div class="part-container">
                    <label class="part-label">
                        <input type="radio" name="body_part" value="다쳤어요" required>
                        <div class="part-box">🩹 다쳤어요</div>
                    </label>
                    <label class="part-label">
                        <input type="radio" name="body_part" value="복통">
                        <div class="part-box">🤢 배</div>
                    </label>
                    <label class="part-label">
                        <input type="radio" name="body_part" value="머리(두통)">
                        <div class="part-box">🤕 머리</div>
                    </label>
                    <label class="part-label">
                        <input type="radio" name="body_part" value="눈">
                        <div class="part-box">👀 눈</div>
                    </label>
                    <label class="part-label">
                        <input type="radio" name="body_part" value="숨쉬기">
                        <div class="part-box">🫁 숨쉬기</div>
                    </label>
                    <label class="part-label">
                        <input type="radio" name="body_part" value="기타">
                        <div class="part-box">✨ 기타</div>
                    </label>
                </div>
            </div>

            <!-- 상세 질문 영역들 -->
            <div id="detail-injury" class="detail-box">
                <div class="sub-q"><label>언제 다쳤나요?</label><input type="text" name="injury_1" placeholder="예: 1교시 쉬는 시간"></div>
                <div class="sub-q"><label>어떻게 다쳤나요?</label><input type="text" name="injury_2" placeholder="예: 뛰어가다 넘어짐"></div>
                <div class="sub-q"><label>어디를 다쳤나요?</label><input type="text" name="injury_3" placeholder="예: 오른쪽 무릎"></div>
                <div class="sub-q"><label>다친 부위를 움직일 수 있나요?</label>
                    <div class="radio-inline"><label><input type="radio" name="injury_4" value="네"> 네</label><label><input type="radio" name="injury_4" value="아니오"> 아니오</label></div>
                </div>
                <div class="sub-q"><label>멍이 보이거나 피가 나나요?</label>
                    <div class="radio-inline"><label><input type="radio" name="injury_5" value="네"> 네</label><label><input type="radio" name="injury_5" value="아니오"> 아니오</label></div>
                </div>
                <div class="sub-q"><label>통증 정도 (1약함 ~ 5심함)</label>
                    <div class="radio-inline">
                        <label><input type="radio" name="injury_pain" value="1(약한 아픔)">1</label><label><input type="radio" name="injury_pain" value="2(불편한 아픔)">2</label>
                        <label><input type="radio" name="injury_pain" value="3(많이 아픔)">3</label><label><input type="radio" name="injury_pain" value="4(심한 통증)">4</label>
                        <label><input type="radio" name="injury_pain" value="5(극심한 통증)">5</label>
                    </div>
                </div>
            </div>

            <div id="detail-stomach" class="detail-box">
                <div class="sub-q"><label>언제부터 아팠나요?</label><input type="text" name="stomach_1" placeholder="예: 집에서 / 2교시"></div>
                <div class="sub-q"><label>배가 아파서 약을 먹고 왔나요?</label>
                    <div class="radio-inline"><label><input type="radio" name="stomach_2" value="네">네</label><label><input type="radio" name="stomach_2" value="아니오">아니오</label></div>
                </div>
                <div class="sub-q"><label>어디가 가장 아픈가요?</label><input type="text" name="stomach_3" placeholder="예: 배 오른쪽 / 배꼽 주변"></div>
                <div class="sub-q"><label>토하거나 설사했나요?</label>
                    <div class="radio-inline"><label><input type="radio" name="stomach_4" value="토했음">토함</label><label><input type="radio" name="stomach_4" value="설사했음">설사</label><label><input type="radio" name="stomach_4" value="안했음">안함</label></div>
                </div>
                <div class="sub-q"><label>속이 울렁거리고 토할 것 같나요?</label>
                    <div class="radio-inline"><label><input type="radio" name="stomach_5" value="네">네</label><label><input type="radio" name="stomach_5" value="아니오">아니오</label></div>
                </div>
                <div class="sub-q"><label>어제 많이 먹었거나 맵거나 기름진 음식을 먹었나요?</label>
                    <div class="radio-inline"><label><input type="radio" name="stomach_6" value="네">네</label><label><input type="radio" name="stomach_6" value="아니오">아니오</label></div>
                </div>
                <div class="sub-q"><label>생리로 인한 통증인가요? (여학생)</label>
                    <div class="radio-inline"><label><input type="radio" name="stomach_7" value="네">네</label><label><input type="radio" name="stomach_7" value="아니오">아니오</label></div>
                </div>
                <div class="sub-q"><label>통증 정도 (1~5)</label>
                    <div class="radio-inline">
                        <label><input type="radio" name="stomach_pain" value="1(약한 아픔)">1</label><label><input type="radio" name="stomach_pain" value="2(불편한 아픔)">2</label>
                        <label><input type="radio" name="stomach_pain" value="3(많이 아픔)">3</label><label><input type="radio" name="stomach_pain" value="4(심한 통증)">4</label>
                        <label><input type="radio" name="stomach_pain" value="5(극심한 통증)">5</label>
                    </div>
                </div>
            </div>

            <div id="detail-head" class="detail-box">
                <div class="sub-q"><label>언제부터 아팠나요?</label><input type="text" name="head_1" placeholder="예: 2교시 / 아침부터"></div>
                <div class="sub-q"><label>머리가 아파서 약을 먹고 왔나요?</label>
                    <div class="radio-inline"><label><input type="radio" name="head_2" value="네">네</label><label><input type="radio" name="head_2" value="아니오">아니오</label></div>
                </div>
                <div class="sub-q"><label>머리를 부딪히거나 다쳤나요?</label>
                    <div class="radio-inline"><label><input type="radio" name="head_3" value="네">네</label><label><input type="radio" name="head_3" value="아니오">아니오</label></div>
                </div>
                <div class="sub-q"><label>열이 나거나 목이 뻣뻣한가요?</label>
                    <div class="radio-inline"><label><input type="radio" name="head_4" value="네">네</label><label><input type="radio" name="head_4" value="아니오">아니오</label></div>
                </div>
                <div class="sub-q"><label>어제 잠을 충분히 잤나요?</label>
                    <div class="radio-inline"><label><input type="radio" name="head_5" value="네">네</label><label><input type="radio" name="head_5" value="아니오">아니오</label></div>
                </div>
                <div class="sub-q"><label>토했거나 많이 어지러운가요?</label>
                    <div class="radio-inline"><label><input type="radio" name="head_6" value="네">네</label><label><input type="radio" name="head_6" value="아니오">아니오</label></div>
                </div>
                <div class="sub-q"><label>통증 정도 (1~5)</label>
                    <div class="radio-inline">
                        <label><input type="radio" name="head_pain" value="1(약한 아픔)">1</label><label><input type="radio" name="head_pain" value="2(불편한 아픔)">2</label>
                        <label><input type="radio" name="head_pain" value="3(많이 아픔)">3</label><label><input type="radio" name="head_pain" value="4(심한 통증)">4</label>
                        <label><input type="radio" name="head_pain" value="5(극심한 통증)">5</label>
                    </div>
                </div>
            </div>

            <div id="detail-eye" class="detail-box">
                <div class="sub-q"><label>언제부터 불편했나요?</label><input type="text" name="eye_1" placeholder="예: 오늘 아침부터"></div>
                <div class="sub-q"><label>어느쪽 눈이 불편한가요?</label>
                    <div class="radio-inline"><label><input type="radio" name="eye_2" value="왼쪽">왼쪽</label><label><input type="radio" name="eye_2" value="오른쪽">오른쪽</label><label><input type="radio" name="eye_2" value="양쪽눈">양쪽</label></div>
                </div>
                <div class="sub-q"><label>눈을 부딪히거나 다쳤나요?</label>
                    <div class="radio-inline"><label><input type="radio" name="eye_3" value="네">네</label><label><input type="radio" name="eye_3" value="아니오">아니오</label></div>
                </div>
                <div class="sub-q"><label>눈곱이 많이 끼나요?</label>
                    <div class="radio-inline"><label><input type="radio" name="eye_4" value="네">네</label><label><input type="radio" name="eye_4" value="아니오">아니오</label></div>
                </div>
                <div class="sub-q"><label>눈이 따갑거나 가려운가요?</label>
                    <div class="radio-inline"><label><input type="radio" name="eye_5" value="네">네</label><label><input type="radio" name="eye_5" value="아니오">아니오</label></div>
                </div>
                <div class="sub-q"><label>이물질이 들어갔나요?</label>
                    <div class="radio-inline"><label><input type="radio" name="eye_6" value="네">네</label><label><input type="radio" name="eye_6" value="아니오">아니오</label></div>
                </div>
            </div>

            <div id="detail-breathing" class="detail-box">
                <div class="sub-q"><label>언제부터 힘들었나요?</label><input type="text" name="breath_1" placeholder="예: 방금"></div>
                <div class="sub-q"><label>집에서 약이나 흡입기를 사용했나요?</label>
                    <div class="radio-inline"><label><input type="radio" name="breath_2" value="네">네</label><label><input type="radio" name="breath_2" value="아니오">아니오</label></div>
                </div>
                <div class="sub-q"><label>숨이 차서 말하기 힘든가요?</label>
                    <div class="radio-inline"><label><input type="radio" name="breath_3" value="네">네</label><label><input type="radio" name="breath_3" value="아니오">아니오</label></div>
                </div>
                <div class="sub-q"><label>천식 진단을 받았나요?</label>
                    <div class="radio-inline"><label><input type="radio" name="breath_4" value="네">네</label><label><input type="radio" name="breath_4" value="아니오">아니오</label></div>
                </div>
                <div class="sub-q"><label>비슷한 증상으로 병원 치료를 받은 적이 있나요?</label>
                    <div class="radio-inline"><label><input type="radio" name="breath_5" value="네">네</label><label><input type="radio" name="breath_5" value="병원치료 받지않음">병원치료 받지않음</label><label><input type="radio" name="breath_5" value="처음있는 증상임">처음있는 증상임</label></div>
                </div>
            </div>

            <div id="detail-etc" class="detail-box">
                <div class="sub-q"><label>언제부터 불편했나요?</label><input type="text" name="etc_1" placeholder="예: 어제"></div>
                <div class="sub-q"><label>어디가 아픈가요?</label><input type="text" name="etc_2" placeholder="귀, 목, 치아 등"></div>
                <div class="sub-q"><label>다쳐서 아픈가요?</label>
                    <div class="radio-inline"><label><input type="radio" name="etc_3" value="네">네</label><label><input type="radio" name="etc_3" value="아니오">아니오</label></div>
                </div>
                <div class="sub-q"><label>얼굴·팔다리·몸에 빨간 반점이 있나요?</label>
                    <div class="radio-inline"><label><input type="radio" name="etc_4" value="네">네</label><label><input type="radio" name="etc_4" value="아니오">아니오</label></div>
                </div>
                <div class="sub-q"><label>치아가 흔들리거나 입술/입안에서 피가 나나요?</label>
                    <div class="radio-inline"><label><input type="radio" name="etc_5" value="네">네</label><label><input type="radio" name="etc_5" value="아니오">아니오</label></div>
                </div>
            </div>

            <button type="submit" id="submitBtn">제 출 하 기</button>
        </form>
    </div>

    <script>
        // DOMContentLoaded 이벤트를 통해 HTML 구조가 모두 렌더링된 후 가장 먼저 UI 기능부터 세팅합니다.
        document.addEventListener('DOMContentLoaded', function() {
            
            // 1️⃣ [핵심 수정] UI 이벤트 연동 (에러에 방해받지 않도록 최상단에 배치)
            const partMap = { 
                "다쳤어요": "injury", 
                "복통": "stomach", 
                "머리(두통)": "head", 
                "눈": "eye", 
                "숨쉬기": "breathing", 
                "기타": "etc" 
            };
            
            const radios = document.querySelectorAll('input[name="body_part"]');
            
            radios.forEach(radio => {
                radio.addEventListener('change', function() {
                    // 모든 디테일 박스를 먼저 숨깁니다.
                    document.querySelectorAll('.detail-box').forEach(box => {
                        box.style.display = 'none';
                    });
                    
                    // 선택된 항목의 박스만 찾아서 보여줍니다.
                    const key = partMap[this.value];
                    if (key) {
                        const targetBox = document.getElementById('detail-' + key);
                        if (targetBox) {
                            targetBox.style.display = 'block';
                        }
                    }
                });
            });

            // 2️⃣ URL 파라미터(학교명) 연동 기능
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const schoolParam = urlParams.get('school_name') || urlParams.get('school') || '미지정';

                const schoolInput = document.getElementById('school_name');
                if (schoolInput) {
                    schoolInput.value = schoolParam;
                }
            } catch(e) {
                console.warn("URL 파라미터 처리 중 예외 발생 (UI 동작에는 영향 없음)");
            }

            // 3️⃣ Supabase 초기화 (오류 발생 시 전체 프로그램이 멈추지 않도록 try-catch로 격리)
            let supabaseClient = null;
            try {
                const SUPABASE_URL = "https://rcipjoyysyajwwxgiijj.supabase.co";
                const SUPABASE_ANON_KEY = "sb_publishable_h9-xbTH8KPvyCwPVXZQNGA_SxI-8gHV";
                
                // 학교 보안망 등에 의해 supabase 라이브러리를 아예 불러오지 못했을 때를 대비한 방어 코드
                if (typeof supabase !== 'undefined') {
                    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                } else {
                    console.warn("네트워크 차단 등의 이유로 Supabase 스크립트를 로드하지 못했습니다.");
                }
            } catch(e) {
                console.warn("Supabase 초기화 중 에러 발생:", e);
            }

            // 4️⃣ 폼 제출(Submit) 기능
            const form = document.getElementById('healthForm');
            const submitBtn = document.getElementById('submitBtn');

            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                if (!supabaseClient) {
                    alert('데이터베이스(Supabase)에 연결할 수 없는 상태입니다. 인터넷 환경이나 보안 설정을 확인해 주세요.');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.innerText = "Supabase에 저장 중...";

                const selectedPart = document.querySelector('input[name="body_part"]:checked')?.value;
                const data = {
                    survey_type: 'elementary',           // ← 추가
                    school_name: schoolParam,
                    grade: document.getElementById('grade').value,
                    class_name: document.getElementById('class_name').value,
                    student_name: document.getElementById('student_name').value,
                    main_symptom: selectedPart,          // ← body_part를 main_symptom으로
                    allergy_detail: document.getElementById('allergy_detail').value || '없음',
                    meds_today: '없음',                  // 필요시 입력 필드 추가 가능
                    details: {                
                        injury: selectedPart === '다쳤어요' ? {
                            when: document.querySelector('input[name="injury_1"]')?.value,
                            how: document.querySelector('input[name="injury_2"]')?.value,
                            where: document.querySelector('input[name="injury_3"]')?.value,
                            movable: document.querySelector('input[name="injury_4"]:checked')?.value,
                            bleeding: document.querySelector('input[name="injury_5"]:checked')?.value,
                            pain_level: document.querySelector('input[name="injury_pain"]:checked')?.value
                        } : null,
                        stomach: selectedPart === '복통' ? {
                            when: document.querySelector('input[name="stomach_1"]')?.value,
                            medicine: document.querySelector('input[name="stomach_2"]:checked')?.value,
                            where: document.querySelector('input[name="stomach_3"]')?.value,
                            vomit_diarrhea: document.querySelector('input[name="stomach_4"]:checked')?.value,
                            nausea: document.querySelector('input[name="stomach_5"]:checked')?.value,
                            overeat: document.querySelector('input[name="stomach_6"]:checked')?.value,
                            menstruation: document.querySelector('input[name="stomach_7"]:checked')?.value,
                            pain_level: document.querySelector('input[name="stomach_pain"]:checked')?.value
                        } : null,
                        head: selectedPart === '머리(두통)' ? {
                            when: document.querySelector('input[name="head_1"]')?.value,
                            medicine: document.querySelector('input[name="head_2"]:checked')?.value,
                            hit: document.querySelector('input[name="head_3"]:checked')?.value,
                            fever_stiff: document.querySelector('input[name="head_4"]:checked')?.value,
                            sleep: document.querySelector('input[name="head_5"]:checked')?.value,
                            vomit_dizzy: document.querySelector('input[name="head_6"]:checked')?.value,
                            pain_level: document.querySelector('input[name="head_pain"]:checked')?.value
                        } : null,
                        eye: selectedPart === '눈' ? {
                            when: document.querySelector('input[name="eye_1"]')?.value,
                            which: document.querySelector('input[name="eye_2"]:checked')?.value,
                            hit: document.querySelector('input[name="eye_3"]:checked')?.value,
                            discharge: document.querySelector('input[name="eye_4"]:checked')?.value,
                            itchy: document.querySelector('input[name="eye_5"]:checked')?.value,
                            foreign: document.querySelector('input[name="eye_6"]:checked')?.value
                        } : null,
                        breathing: selectedPart === '숨쉬기' ? {
                            when: document.querySelector('input[name="breath_1"]')?.value,
                            inhaler: document.querySelector('input[name="breath_2"]:checked')?.value,
                            shortness: document.querySelector('input[name="breath_3"]:checked')?.value,
                            asthma: document.querySelector('input[name="breath_4"]:checked')?.value,
                            hospital: document.querySelector('input[name="breath_5"]:checked')?.value
                        } : null,
                        etc: selectedPart === '기타' ? {
                            when: document.querySelector('input[name="etc_1"]')?.value,
                            where: document.querySelector('input[name="etc_2"]')?.value,
                            injury: document.querySelector('input[name="etc_3"]:checked')?.value,
                            rash: document.querySelector('input[name="etc_4"]:checked')?.value,
                            bleeding_teeth: document.querySelector('input[name="etc_5"]:checked')?.value
                        } : null
                    },
                    created_at: new Date().toISOString()
                };

                try {
                    const { data: result, error } = await supabaseClient
                        .from('health_survey')
                        .insert([data]);

                    if (error) throw error;

                    alert('✅ 성공적으로 제출되었습니다!');
                    form.reset();
                    
                    const urlParams = new URLSearchParams(window.location.search);
                    const schoolParam = urlParams.get('school');
                    if (schoolParam) {
                        document.getElementById('school_name').value = schoolParam;
                    } else {
                        document.getElementById('school_name').value = '미지정';
                    }
                    
                    document.querySelectorAll('.detail-box').forEach(box => box.style.display = 'none');

                } catch (err) {
                    console.error('Supabase 저장 에러:', err);
                    alert('저장 실패: ' + (err.message || err));
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerText = "제 출 하 기";
                }
            });
        });
    </script>
</body>
</html>
