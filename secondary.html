<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 건강 통합 문진표 (중고등) - Supabase 연동</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            background-color: #f4f6f7; 
            padding: 15px; 
            margin: 0;
        }
        .container { 
            max-width: 650px; 
            margin: auto; 
            background: white; 
            padding: 25px 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            box-sizing: border-box;
        }
        h1 { 
            text-align: center; 
            color: white; 
            font-size: 26px; 
            margin-bottom: 25px;
            background-color: #25ac5d;           
            padding: 20px 20px;
            margin: -25px -20px 25px -20px;     
            border-radius: 15px 15px 0 0;      
        }
        h2 { color: #007bff; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-top: 30px; font-size: 20px; }
        h3 { font-size: 18px; color: #444; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #eee; border-radius: 10px; background: #fafafa; }
        label { display: block; margin-top: 12px; font-weight: bold; font-size: 16px; color: #444; }

        /* 텍스트 입력창, 선택창 크기 및 글자 확대 */
        input[type="text"], input[type="number"], select {
            width: 100%; 
            padding: 12px; 
            margin-top: 8px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 6px;
            font-size: 16px; 
        }
        
        /* 라디오 및 체크박스 라벨 크기 키우기 */
        .section label input[type="radio"], 
        .section label input[type="checkbox"],
        .checkbox-group label input {
            transform: scale(1.2);
            margin-right: 6px;
            vertical-align: middle;
        }
        .section label {
            display: inline-block;
            margin-right: 15px;
            font-weight: normal;
            font-size: 16px;
            cursor: pointer;
            vertical-align: middle;
        }
        .section > label, .sub-q > label { display: block; font-weight: bold; margin-bottom: 5px; }

        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .checkbox-group label { margin: 0; padding: 8px 0; }

        /* 통증 척도 모바일 최적화 */
        .pain-scale { display: flex; justify-content: space-between; margin: 15px 0; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .pain-option { text-align: center; font-size: 14px; flex: 1; }
        .pain-option input[type="radio"] { transform: scale(1.3); margin-bottom: 5px; }
        
        /* 제출하기 버튼 확대 */
        button { width: 100%; padding: 16px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 25px; }
        
        .info-row { 
            display: flex; 
            gap: 12px; 
            align-items: flex-start; 
            flex-wrap: nowrap; 
        }
        .info-box { 
            flex: 1; 
            min-width: 120px;
            display: flex;
            flex-direction: column;
        }
        .info-box label {
            margin-top: 0; /* 상단 여백 제거로 정렬 개선 */
        }
        .sub-q { margin-bottom: 22px; }
        .consent-text { color: red; font-size: 14px; line-height: 1.5; margin-top: 15px; font-weight: bold; }

        /* 📱 스마트폰 화면(가로폭 500px 이하) 모바일 최적화 추가 */
        @media (max-width: 500px) {
            .info-row { 
                flex-direction: column; 
                gap: 15px; 
            }
            .info-box {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏥 학생 건강상태 문진 (중고등)</h1>    

    <form id="healthForm">
        <h2>기본 정보</h2>
        <div class="section">
            <div class="info-row">
                <div class="info-box">
                    <label>학년</label>
                    <select id="common_grade" required>
                        <option value="">선택</option>
                        <option value="1학년">1학년</option>
                        <option value="2학년">2학년</option>
                        <option value="3학년">3학년</option>
                    </select>
                    <small style="color:#666; font-size:12px; margin-top:2px; display:block;">(중학교/고등학교 1~3학년)</small>
                </div>
                <div class="info-box">
                    <label>반</label>
                    <select id="common_class" required>
                        <option value="">선택</option>
                        <option value="1반">1반</option>
                        <option value="2반">2반</option>
                        <option value="3반">3반</option>
                        <option value="4반">4반</option>
                        <option value="5반">5반</option>
                        <option value="6반">6반</option>
                        <option value="7반">7반</option>
                        <option value="8반">8반</option>
                        <option value="9반">9반</option>
                        <option value="10반">10반</option>
                    </select>
                </div>
                <div class="info-box">
                    <label>이름</label>
                    <input type="text" id="common_name" required>
                </div>
            </div>
            <label>체온(℃)</label>
            <input type="number" step="0.1" id="common_temp" required>
        </div>

        <h2>증상 선택</h2>
        <div class="section">
            <label>오늘 아픈 증상을 선택하세요</label>
            <div style="margin-top: 10px;">
                <label><input type="radio" name="main_symptom" value="headache" required> 두통</label>
                <label><input type="radio" name="main_symptom" value="stomachache"> 복통</label>
                <label><input type="radio" name="main_symptom" value="both"> 두통과 복통</label>
                <label><input type="radio" name="main_symptom" value="cold"> 감기</label>
            </div>
        </div>

        <div id="detailSection" class="section" style="display:none;"></div>

        <h2>약물 및 동의 사항</h2>
        <div class="section">
            <label>약물 알러지가 있나요?</label>
            <input type="text" id="common_allergy" placeholder="없음 또는 약 이름">
            
            <label>오늘 복용한 약(이름, 시각)</label>
            <input type="text" id="common_meds">
            
            <p class="consent-text">모든 약은 간독성, 신독성, 호흡곤란, 울렁거림 등의 부작용이 있을 수 있음을 확인했으며, 그래도 약 복용을 원합니다.</p>
            <div style="margin-top: 10px;">
                <label><input type="radio" name="consent" value="네" required> 네</label>
                <label><input type="radio" name="consent" value="아니요"> 아니요</label>
            </div>
        </div>

        <button type="submit" id="submitBtn">제 출 하 기</button>
    </form>
</div>

<script>
    // ==================== 1. 가장 먼저 함수 정의 ====================
    function getPainScale(prefix) {
        let html = '<div class="pain-scale">';
        for (let i = 1; i <= 10; i++) {
            html += `<label class="pain-option"><input type="radio" name="${prefix}_pain" value="${i}" required><br>${i}</label>`;
        }
        return html + '</div>';
    }

    // ==================== 2. 상세 질문 HTML 템플릿 (getPainScale 이후에 정의) ====================
    const headacheHTML = `
        <h3>두통 상세</h3>
        <div class="sub-q"><label>통증 정도 (1경도~10심함)</label>${getPainScale('h')}</div>
        <div class="sub-q"><label>수면 시간 (시간)</label><input type="number" id="h_sleep_time" placeholder="어제 잔 시간(예: 7)"></div>
        <div class="sub-q"><label>언제부터 아팠나요?</label><input type="text" id="h_start" placeholder="예: 아침, 2교시"></div>
        <div class="sub-q"><label>유전성 두통이 있나요?</label><select id="h_genetic"><option value="아니요">아니요</option><option value="예">예</option></select></div>
        <div class="sub-q"><label>두통으로 진료받았는지 여부</label><select id="h_history"><option value="아니요">아니요</option><option value="예">예</option></select></div>
        <div class="sub-q"><label>최근 스트레스 여부</label><select id="h_stress"><option value="아니요">아니요</option><option value="예">예</option></select></div>
        <div class="sub-q"><label>추위에 노출 여부</label><select id="h_cold"><option value="아니요">아니요</option><option value="예">예</option></select></div>
        <div class="sub-q"><label>머리 충격 여부</label><select id="h_impact"><option value="아니요">아니요</option><option value="예">예</option></select></div>
        <div class="sub-q"><label>수면 부족 여부</label><select id="h_sleep_lack"><option value="아니요">아니요</option><option value="예">예</option></select></div>
        <div class="sub-q"><label>편두통 진료 여부</label><select id="h_migraine"><option value="아니요">아니요</option><option value="예">예</option></select></div>
        <div class="sub-q"><label>생리 여부 (여학생)</label><select id="h_period"><option value="해당 없음">해당 없음</option><option value="생리 전">생리 전</option><option value="생리 중">생리 중</option><option value="생리 끝">생리 끝</option></select></div>
    `;

    const stomachacheHTML = `
        <h3>복통 상세</h3>
        <div class="sub-q"><label>통증 정도 (1경도~10심함)</label>${getPainScale('s')}</div>
        <div class="sub-q"><label>언제부터 아팠나요?</label><input type="text" id="s_start" placeholder="예: 2교시"></div>
        <div class="sub-q"><label>배 아프기 전에 먹은 음식</label><input type="text" id="s_food" placeholder="최근 먹은 음식"></div>
        <div class="sub-q">
            <label>복통 양상 (중복 선택 가능)</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="s_type" value="콕콕 쑤심"> 콕콕 쑤심</label>
                <label><input type="checkbox" name="s_type" value="찌르듯"> 찌르듯</label>
                <label><input type="checkbox" name="s_type" value="꼬이듯"> 꼬이듯</label>
                <label><input type="checkbox" name="s_type" value="쥐어짜는 듯"> 쥐어짜는 듯</label>
                <label><input type="checkbox" name="s_type" value="더부룩함"> 더부룩함</label>
                <label><input type="checkbox" name="s_type" value="답답"> 답답</label>
                <label><input type="checkbox" name="s_type" value="부글부글 끓듯"> 부글부글 끓듯</label>
                <label><input type="checkbox" name="s_type" value="울렁거림"> 울렁거림</label>
                <label><input type="checkbox" name="s_type" value="토할 것 같음"> 토할 것 같음</label>
            </div>
        </div>
        <div class="sub-q"><label>통증 부위</label><select id="s_area"><option value="복부 오른쪽">복부 오른쪽</option><option value="복부 왼쪽">복부 왼쪽</option><option value="배 중앙">배 중앙</option><option value="명치">명치</option><option value="복부 전체">복부 전체</option></select></div>
        <div class="sub-q"><label>생리 여부 (여학생)</label><select id="s_period"><option value="해당 없음">해당 없음</option><option value="생리 전">생리 전</option><option value="생리 중">생리 중</option><option value="생리 끝">생리 끝</option></select></div>
    `;

    const coldHTML = `
        <h3>감기 상세</h3>
        <div class="sub-q">
            <label>증상 (중복 선택)</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="cold_sym" value="기침"> 기침</label>
                <label><input type="checkbox" name="cold_sym" value="인후통"> 인후통</label>
                <label><input type="checkbox" name="cold_sym" value="콧물"> 콧물</label>
                <label><input type="checkbox" name="cold_sym" value="코막힘"> 코막힘</label>
                <label><input type="checkbox" name="cold_sym" value="발열"> 발열</label>
            </div>
        </div>
        <div class="sub-q"><label>언제부터 시작되었나요?</label><input type="text" id="c_start" placeholder="예: 어제, 3교시"></div>
    `;

    // ==================== 3. renderDetail 함수 ====================
    function renderDetail(symptom) {
        const detailSection = document.getElementById('detailSection');
        if (!detailSection) return;

        let htmlContent = '';
        if (symptom === 'headache' || symptom === 'both') {
            htmlContent += headacheHTML;
        }
        if (symptom === 'stomachache' || symptom === 'both') {
            htmlContent += stomachacheHTML;
        }
        if (symptom === 'cold') {
            htmlContent += coldHTML;
        }

        detailSection.innerHTML = htmlContent;
        detailSection.style.display = 'block';
    }

    // ==================== 4. 메인 로직 (DOMContentLoaded) ====================
    let schoolParam = '미지정';
    let supabaseClient = null;

    const SUPABASE_URL = "https://rcipjoyysyajwwxgiijj.supabase.co";
    const SUPABASE_ANON_KEY ="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjaXBqb3l5c3lhand3eGdpaWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNjAyOTgsImV4cCI6MjA5NDczNjI5OH0.OTOf0EziLjGod1IVCeNKewzoi2jFr9vsuNQcOPWDQtQ";

    if (!SUPABASE_URL.includes('YOUR-PROJECT')) {
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    document.addEventListener('DOMContentLoaded', function() {
        // 학교명 파라미터
        const urlParams = new URLSearchParams(window.location.search);
        schoolParam = urlParams.get('school_name') || urlParams.get('school') || '미지정';

        // 증상 선택 시 상세 질문 표시
        document.querySelectorAll('input[name="main_symptom"]').forEach(radio => {
            radio.addEventListener('change', function() {
                renderDetail(this.value);
            });
        });

        // 폼 제출
        const form = document.getElementById('healthForm');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!supabaseClient) {
                alert('Supabase에 연결할 수 없습니다. 키를 확인하세요.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "저장 중...";

            const selectedSymptom = document.querySelector('input[name="main_symptom"]:checked')?.value;

            let symptomsDetail = { symptom_type: selectedSymptom };

            // 두통 또는 두통+복통
            if (selectedSymptom === 'headache' || selectedSymptom === 'both') {
                symptomsDetail.headache = {
                    h_pain: document.querySelector('input[name="h_pain"]:checked')?.value || null,
                    h_sleep_time: document.getElementById('h_sleep_time')?.value || null,
                    h_start: document.getElementById('h_start')?.value || null,
                    h_genetic: document.getElementById('h_genetic')?.value || null,
                    h_history: document.getElementById('h_history')?.value || null,
                    h_stress: document.getElementById('h_stress')?.value || null,
                    h_cold: document.getElementById('h_cold')?.value || null,
                    h_impact: document.getElementById('h_impact')?.value || null,
                    h_sleep_lack: document.getElementById('h_sleep_lack')?.value || null,
                    h_migraine: document.getElementById('h_migraine')?.value || null,
                    h_period: document.getElementById('h_period')?.value || null
                };
            }
            // 복통 또는 두통+복통
            if (selectedSymptom === 'stomachache' || selectedSymptom === 'both') {
                const checkedTypes = Array.from(document.querySelectorAll('input[name="s_type"]:checked')).map(el => el.value);
                symptomsDetail.stomachache = {
                    s_pain: document.querySelector('input[name="s_pain"]:checked')?.value || null,
                    s_start: document.getElementById('s_start')?.value || null,
                    s_food: document.getElementById('s_food')?.value || null,
                    s_type: checkedTypes.length > 0 ? checkedTypes : null,
                    s_area: document.getElementById('s_area')?.value || null,
                    s_period: document.getElementById('s_period')?.value || null
                };
            }
            // 감기
            if (selectedSymptom === 'cold') {
                const checkedCold = Array.from(document.querySelectorAll('input[name="cold_sym"]:checked')).map(el => el.value);
                symptomsDetail.cold = {
                    cold_sym: checkedCold.length > 0 ? checkedCold : null,
                    c_start: document.getElementById('c_start')?.value || null
                };
            }

            const dataToInsert = {
                form_type: 'secondary',
                school_name: schoolParam,
                grade: document.getElementById('common_grade').value,
                class_name: document.getElementById('common_class').value,
                student_name: document.getElementById('common_name').value,
                main_symptom: selectedSymptom,
                allergy_detail: document.getElementById('common_allergy').value || '없음',
                meds_today: document.getElementById('common_meds').value || '없음',
                temperature: document.getElementById('common_temp').value,
                consent: document.querySelector('input[name="consent"]:checked')?.value,
                details: symptomsDetail,
                created_at: new Date().toISOString()
            };

            try {
                const { error } = await supabaseClient.from('health_survey').insert([dataToInsert]);
                if (error) throw error;

                alert('✅ 성공적으로 제출되었습니다! (중고등부)');
                form.reset();
                document.getElementById('detailSection').style.display = 'none';
            } catch (err) {
                console.error(err);
                alert('저장 실패: ' + (err.message || err) + '\n\nSupabase RLS 정책 또는 anon 키를 확인하세요. (Dashboard > Authentication > Policies)');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "제 출 하 기";
            }
        });
    });
</script>
</body>
</html>
