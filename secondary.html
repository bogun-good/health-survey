<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 건강 통합 문진표 (중고등)</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f6f7; padding: 15px; margin: 0; display: flex; justify-content: center; }
        .container { max-width: 650px; width: 100%; background: white; padding: 25px 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        h1 { text-align: center; color: white; font-size: 24px; margin-bottom: 25px; background-color: #25ac5d; padding: 20px; margin: -25px -20px 25px -20px; border-radius: 15px 15px 0 0; }
        h2 { color: #25ac5d; border-bottom: 2px solid #25ac5d; padding-bottom: 10px; margin-top: 30px; font-size: 19px; }
        h3 { color: #333; font-size: 17px; margin-top: 5px; margin-bottom: 15px; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #eee; border-radius: 10px; background: #fafafa; }
        label { display: block; margin-top: 12px; font-weight: bold; font-size: 15px; color: #444; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
        .pain-scale { display: flex; justify-content: space-between; margin: 15px 0; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .pain-option { text-align: center; font-size: 13px; flex: 1; cursor: pointer; }
        .pain-option input { cursor: pointer; }
        button { width: 100%; padding: 16px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 19px; font-weight: bold; cursor: pointer; margin-top: 25px; }
        button:hover { background: #218838; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        .sub-q { margin-bottom: 22px; }
        .consent-text { color: #e74c3c; font-size: 14px; line-height: 1.5; margin-top: 15px; font-weight: bold; }
        hr { border: 0; height: 1px; background: #ddd; margin: 25px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>🏥 학생 건강상태 문진 (중고등)</h1>
    <form id="healthForm">
        <h2>기본 정보</h2>
        <div class="section">
            <div style="display:flex; gap:12px; flex-wrap:wrap;">
                <div style="flex:1; min-width:140px;">
                    <label>학년</label>
                    <select id="common_grade" required>
                        <option value="">선택</option>
                        <option value="1학년">1학년</option><option value="2학년">2학년</option><option value="3학년">3학년</option>
                        <option value="4학년">4학년</option><option value="5학년">5학년</option><option value="6학년">6학년</option>
                    </select>
                </div>
                <div style="flex:1; min-width:140px;">
                    <label>반</label>
                    <select id="common_class" required>
                        <option value="">선택</option>
                        <option value="1반">1반</option><option value="2반">2반</option><option value="3반">3반</option>
                        <option value="4반">4반</option><option value="5반">5반</option><option value="6반">6반</option>
                        <option value="7반">7반</option><option value="8반">8반</option><option value="9반">9반</option><option value="10반">10반</option>
                        <option value="11반">11반</option><option value="12반">12반</option>
                    </select>
                </div>
                <div style="flex:1; min-width:140px;">
                    <label>이름</label>
                    <input type="text" id="common_name" placeholder="이름 입력" required>
                </div>
            </div>
            <label>체온(℃)</label>
            <input type="number" step="0.1" id="common_temp" placeholder="예: 36.5" required>
        </div>

        <h2>증상 선택</h2>
        <div class="section">
            <label>오늘 아픈 증상을 선택하세요</label>
            <div style="margin-top:10px; display: flex; flex-direction: column; gap: 8px;">
                <label style="font-weight: normal;"><input type="radio" name="main_symptom" value="headache" required> 두통</label>
                <label style="font-weight: normal;"><input type="radio" name="main_symptom" value="stomachache"> 복통</label>
                <label style="font-weight: normal;"><input type="radio" name="main_symptom" value="both"> 두통과 복통</label>
                <label style="font-weight: normal;"><input type="radio" name="main_symptom" value="cold"> 감기</label>
            </div>
        </div>

        <div id="detailSection" class="section" style="display:none;"></div>

        <h2>약물 및 동의 사항</h2>
        <div class="section">
            <label>약물 알러지가 있나요?</label>
            <input type="text" id="common_allergy" placeholder="없음 또는 알러지 약 이름">
            <label>오늘 복용한 약 (이름, 복용 시각)</label>
            <input type="text" id="common_meds" placeholder="없음 또는 약 이름과 대략적인 시각">
            <p class="consent-text">⚠️ 모든 약은 간독성, 신독성, 호흡곤란, 울렁거림 등의 부작용이 있을 수 있음을 확인했으며, 그래도 약 복용을 원합니다.</p>
            <div style="margin-top:10px; display: flex; gap: 20px;">
                <label style="font-weight: normal;"><input type="radio" name="consent" value="네" required> 네, 동의합니다.</label>
                <label style="font-weight: normal;"><input type="radio" name="consent" value="아니요"> 아니요</label>
            </div>
        </div>

        <button type="submit" id="submitBtn">제 출 하 기</button>
    </form>
</div>

<script>
    function getPainScale(prefix) {
        let html = '<div class="pain-scale">';
        for(let i=1; i<=10; i++) {
            html += `<label class="pain-option"><input type="radio" name="${prefix}_pain" value="${i}" required><br>${i}</label>`;
        }
        return html + '</div>';
    }

    const headacheHTML = `
        <h3>🧠 두통 상세 문진</h3>
        <div class="sub-q"><label>통증 정도 (1약함 ~ 10극심함)</label>${getPainScale('h')}</div>
        <div class="sub-q"><label>어제 수면 시간 (시간)</label><input type="number" id="h_sleep_time" placeholder="예: 7"></div>
        <div class="sub-q"><label>언제부터 아팠나요?</label><input type="text" id="h_start" placeholder="예: 아침 기상 후, 2교시 쉬는 시간"></div>
        <div class="sub-q"><label>가족 중 유전성 두통이 있나요?</label><select id="h_genetic"><option value="아니요">아니요</option><option value="예">예</option></select></div>
        <div class="sub-q"><label>두통으로 병원 진료를 받은 적이 있나요?</label><select id="h_history"><option value="아니요">아니요</option><option value="예">예</option></select></div>
        <div class="sub-q"><label>최근 시험, 학업 등으로 스트레스를 많이 받았나요?</label><select id="h_stress"><option value="아니요">아니요</option><option value="예">예</option></select></div>
        <div class="sub-q"><label>최근 에어컨, 한파 등 추위에 오래 노출되었나요?</label><select id="h_cold"><option value="아니요">아니요</option><option value="예">예</option></select></div>
        <div class="sub-q"><label>최근 머리를 부딪히거나 충격을 받은 적이 있나요?</label><select id="h_impact"><option value="아니요">아니요</option><option value="예">예</option></select></div>
        <div class="sub-q"><label>최근 잠이 많이 부족했나요?</label><select id="h_sleep_lack"><option value="아니요">아니요</option><option value="예">예</option></select></div>
        <div class="sub-q"><label>병원에서 편두통 진단을 받은 적이 있나요?</label><select id="h_migraine"><option value="아니요">아니요</option><option value="예">예</option></select></div>
        <div class="sub-q"><label>생리 주기와 관련이 있나요? (여학생만)</label>
            <select id="h_period"><option value="해당 없음">해당 없음</option><option value="생리 전">생리 전</option><option value="생리 중">생리 중</option><option value="생리 끝">생리 끝</option></select>
        </div>
    `;

    const stomachacheHTML = `
        <h3>🤢 복통 상세 문진</h3>
        <div class="sub-q"><label>통증 정도 (1약함 ~ 10극심함)</label>${getPainScale('s')}</div>
        <div class="sub-q"><label>언제부터 아팠나요?</label><input type="text" id="s_start" placeholder="예: 2교시 수업 시간"></div>
        <div class="sub-q"><label>배 아프기 전에 먹은 음식이나 간식이 있나요?</label><input type="text" id="s_food" placeholder="최근 식사 혹은 간식 내용"></div>
        <div class="sub-q"><label>복통 양상 (해당되는 것 모두 선택 가능)</label>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px;">
                <label style="font-weight:normal;"><input type="checkbox" name="s_type" value="콕콕 쑤심"> 콕콕 쑤심</label>
                <label style="font-weight:normal;"><input type="checkbox" name="s_type" value="찌르듯 아픔"> 찌르듯 아픔</label>
                <label style="font-weight:normal;"><input type="checkbox" name="s_type" value="배가 꼬이듯"> 배가 꼬이듯</label>
                <label style="font-weight:normal;"><input type="checkbox" name="s_type" value="쥐어짜는 듯"> 쥐어짜는 듯</label>
                <label style="font-weight:normal;"><input type="checkbox" name="s_type" value="더부룩함"> 더부룩함</label>
                <label style="font-weight:normal;"><input type="checkbox" name="s_type" value="가슴 답답"> 가슴 답답</label>
                <label style="font-weight:normal;"><input type="checkbox" name="s_type" value="속이 부글부글"> 속이 부글부글</label>
                <label style="font-weight:normal;"><input type="checkbox" name="s_type" value="울렁거리거나 토할 것 같음"> 울렁거리거나 토함</label>
            </div>
        </div>
        <div class="sub-q"><label>가장 아픈 통증 부위</label>
            <select id="s_area"><option value="배 중앙">배 중앙(배꼽 주변)</option><option value="명치 부위">명치 부위</option><option value="복부 오른쪽">복부 오른쪽</option><option value="복부 왼쪽">복부 왼쪽</option><option value="복부 전체">복부 전체</option></select>
        </div>
        <div class="sub-q"><label>생리통인가요? (여학생만)</label>
            <select id="s_period"><option value="해당 없음">해당 없음</option><option value="생리 전 증후군">생리 전 증후군</option><option value="생리 중 통증">생리 중 통증</option><option value="생리 끝날 무렵">생리 끝날 무렵</option></select>
        </div>
    `;

    const coldHTML = `
        <h3>🤧 감기 상세 문진</h3>
        <div class="sub-q"><label>현재 겪고 있는 증상 (중복 선택 가능)</label>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px;">
                <label style="font-weight:normal;"><input type="checkbox" name="cold_sym" value="기침"> 기침</label>
                <label style="font-weight:normal;"><input type="checkbox" name="cold_sym" value="인후통(목아픔)"> 인후통(목아픔)</label>
                <label style="font-weight:normal;"><input type="checkbox" name="cold_sym" value="콧물"> 콧물</label>
                <label style="font-weight:normal;"><input type="checkbox" name="cold_sym" value="코막힘"> 코막힘</label>
                <label style="font-weight:normal;"><input type="checkbox" name="cold_sym" value="발열 및 오한"> 발열 및 오한</label>
            </div>
        </div>
        <div class="sub-q"><label>언제부터 증상이 시작되었나요?</label><input type="text" id="c_start" placeholder="예: 어제 저녁부터, 오늘 아침"></div>
    `;

    function renderDetail(type) {
        const container = document.getElementById('detailSection');
        container.style.display = 'block';

        if (type === 'headache') container.innerHTML = headacheHTML;
        else if (type === 'stomachache') container.innerHTML = stomachacheHTML;
        else if (type === 'both') container.innerHTML = headacheHTML + '<hr>' + stomachacheHTML;
        else if (type === 'cold') container.innerHTML = coldHTML;
    }

    document.addEventListener('DOMContentLoaded', function() {
        // 증상 선택 라디오 이벤트
        document.querySelectorAll('input[name="main_symptom"]').forEach(radio => {
            radio.addEventListener('change', function() {
                renderDetail(this.value);
            });
        });

        // 🚀 Flask 안전 중계 서버 연동 전송 로직
        document.getElementById('healthForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const mainSymptomRadio = document.querySelector('input[name="main_symptom"]:checked');
            
            if (!mainSymptomRadio) { alert("주요 증상을 선택해 주세요!"); return; }
            
            submitBtn.disabled = true;
            submitBtn.innerText = "안전하게 제출 중...";

            const grade = document.getElementById('common_grade').value;
            const className = document.getElementById('common_class').value;
            const studentName = document.getElementById('common_name').value;
            const temp = document.getElementById('common_temp').value;
            const allergy = document.getElementById('common_allergy').value.trim();
            const meds = document.getElementById('common_meds').value.trim();
            const consent = document.querySelector('input[name="consent"]:checked').value;

            // 기본 구조화 데이터 정의
            const answers_dict = {
                "체온": temp + "℃",
                "약물알러지": allergy || "없음",
                "당일복용약물": meds || "없음",
                "부작용동의여부": consent
            };
            
            const details_dict = {};
            const symptomValue = mainSymptomRadio.value;

            // 두통 필드 데이터 추출
            if (symptomValue === 'headache' || symptomValue === 'both') {
                const hPain = document.querySelector('input[name="h_pain"]:checked')?.value;
                if (hPain) details_dict["두통 통증정도"] = hPain + "/10";
                if (document.getElementById('h_sleep_time')?.value) details_dict["수면시간"] = document.getElementById('h_sleep_time').value + "시간";
                if (document.getElementById('h_start')?.value) details_dict["두통시작시점"] = document.getElementById('h_start').value;
                if (document.getElementById('h_genetic')?.value) details_dict["유전성두통여부"] = document.getElementById('h_genetic').value;
                if (document.getElementById('h_history')?.value) details_dict["두통진료이력"] = document.getElementById('h_history').value;
                if (document.getElementById('h_stress')?.value) details_dict["스트레스여부"] = document.getElementById('h_stress').value;
                if (document.getElementById('h_cold')?.value) details_dict["추위노출여부"] = document.getElementById('h_cold').value;
                if (document.getElementById('h_impact')?.value) details_dict["머리충격여부"] = document.getElementById('h_impact').value;
                if (document.getElementById('h_sleep_lack')?.value) details_dict["수면부족여부"] = document.getElementById('h_sleep_lack').value;
                if (document.getElementById('h_migraine')?.value) details_dict["편두통진단여부"] = document.getElementById('h_migraine').value;
                if (document.getElementById('h_period')?.value) details_dict["생리관련성(두통)"] = document.getElementById('h_period').value;
            }

            // 복통 필드 데이터 추출
            if (symptomValue === 'stomachache' || symptomValue === 'both') {
                const sPain = document.querySelector('input[name="s_pain"]:checked')?.value;
                if (sPain) details_dict["복통 통증정도"] = sPain + "/10";
                if (document.getElementById('s_start')?.value) details_dict["복통시작시점"] = document.getElementById('s_start').value;
                if (document.getElementById('s_food')?.value) details_dict["복통전섭취음식"] = document.getElementById('s_food').value;
                
                const sTypes = [];
                document.querySelectorAll('input[name="s_type"]:checked').forEach(cb => sTypes.push(cb.value));
                if (sTypes.length > 0) details_dict["복통양상"] = sTypes.join(', ');

                if (document.getElementById('s_area')?.value) details_dict["통증부위"] = document.getElementById('s_area').value;
                if (document.getElementById('s_period')?.value) details_dict["생리통여부"] = document.getElementById('s_period').value;
            }

            // 감기 필드 데이터 추출
            if (symptomValue === 'cold') {
                const coldSyms = [];
                document.querySelectorAll('input[name="cold_sym"]:checked').forEach(cb => coldSyms.push(cb.value));
                if (coldSyms.length > 0) details_dict["감기세부증상"] = coldSyms.join(', ');
                if (document.getElementById('c_start')?.value) details_dict["감기시작시점"] = document.getElementById('c_start').value;
            }

            const symptomTextMap = {
                "headache": "두통", "stomachache": "복통", "both": "두통 및 복통", "cold": "감기"
            };

            const payload = {
                "grade": grade,
                "class_name": className,
                "student_name": studentName,
                "symptom": symptomTextMap[symptomValue] || symptomValue,
                "type": "secondary", 
                "answers": answers_dict,
                "details": details_dict
            };

            try {
                // Flask 백엔드 API로 전송하면 Flask가 config.json의 학교명을 매핑해 줍니다.
                const response = await fetch('/api/submit_survey', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.success) {
                    alert("문진표가 성공적으로 제출되었습니다. 보건실로 입장하세요.");
                    document.getElementById('healthForm').reset();
                    document.getElementById('detailSection').style.display = 'none';
                } else {
                    alert("제출 실패: " + result.message);
                }
            } catch (error) {
                console.error("전송 에러:", error);
                alert("서버 연결에 실패했습니다. 보건 선생님께 직접 말씀드리세요.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "제 출 하 기";
            }
        });
    });
</script>
</body>
</html>
